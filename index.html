<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Student Marks Predictor</title>
        <style>
            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                font-family: Arial, sans-serif;
                background: linear-gradient(135deg, #8fdc6f, #42d392);
                min-height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                padding: 20px;
            }

            .container {
                width: 100%;
                max-width: 500px;
                background: rgba(255, 255, 255, 0.96);
                border-radius: 24px;
                padding: 40px 30px;
                box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
                text-align: center;
                animation: fadeIn 0.7s ease;
            }

            h1 {
                margin-top: 0;
                margin-bottom: 12px;
                font-size: 42px;
                color: #1f2937;
            }

            .subtitle {
                font-size: 18px;
                color: #6b7280;
                margin-bottom: 30px;
            }

            .input-box {
                width: 100%;
                padding: 16px;
                font-size: 18px;
                border: 2px solid #d1d5db;
                border-radius: 14px;
                outline: none;
                transition: 0.3s;
                margin-bottom: 20px;

            }

            .input-box:focus {
                border-color: #22c55e;
                box-shadow: 0 0 10px rgba(34, 197, 94, 0.2);
            }

            .predict-btn {
                background: linear-gradient(135deg, #22c55e, #15803d);
                color: white;
                border: none;
                padding: 14px 28px;
                font-size: 18px;
                font-weight: bold;
                border-radius: 14px;
                cursor: pointer;
                transition: 0.3s;
            }
            .predict-btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 8px 20px rgba(21, 128, 61, 0.25);
            }
            .predict-btn:disabled {
                opacity: 0.7;
                cursor: not-allowed;
                transform: none;
                box-shadow: none;
            }

            .result-card {
                margin-top: 28px;
                background: #f9fafb;
                border-radius: 18px;
                padding: 22px;
            }

            .result-title {
                color: #6b7280;
                font-size: 16px;
                margin-bottom: 8px;
            }

            #result {
                margin: 0;
                font-size: 38px;
                font-weight: bold;
                color: #111827;
            }


            .note {
                margin-top: 20px;
                font-size: 14px;
                color: #6b7280;
            }


            .footer {
                margin-top: 24px;
                color: #4b5563;
                font-size: 15px;
        }
            
            #historyList {
                padding: 0;
                margin-top: 15px;
            }

            #historyList li {
                list-style: none;
            }

            .history-card {
                display: flex;
                justify-content: space-between;
                background: #ffffff;
                margin: 10px 0;
                padding: 14px 18px;
                border-radius: 12px;
                font-weight: 600;
                box-shadow: 0 4px 10px rgba(0,0,0,0.1);
                border-left: 5px solid #4CAF50;
            }

            .history-card .hours {
                color: #555;
            }

            .history-card .marks {
                color: #2e7d32;
                font-weight: bold;
            }


            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(20px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

        </style>

        
        

        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    </head>
    <body>
        <div class="container">
            <h1>Marks Predictor</h1>
            <p class="subtitle">Enter study hours to predict student marks instantly.</p>

            <p id="welcome" style="display:none; font-weight:bold;"></p>

            <div id="loginSection">
                <h3>Login</h3>
                <input type="text" id="username" class="input-box" placeholder="Username">
                <input type="password" id="password" class="input-box" placeholder="Password">
                <button onClick="loginUser()" class="predict-btn">Login</button>
                <button onclick="signup()" class="predict-btn">Signup</button>
            </div>
           
            <div id="appSection" style="display:none;">
                <input type="number" id="hours" class="input-box" placeholder="Enter study hours" step="any">
                <button id="predict-btn" class="predict-btn" onclick="predictMarks()">Predict Marks</button>
                <button onclick="logout()" class="predict-btn">Logout</button>
            </div>

            <div class="result-card">
                <div class="result-title">Predicted Marks:</div>
                <p id="result">Waiting...</p>
            </div>

            <canvas id="myChart"></canvas>

            <h3 class="history-title">Prediction History</h3>
            
            <button onclick="clearHistory()" class="predict-btn" style="margin-top: 10px; background: #ef4444;">Clear History</button>
            <ul id="historyList"></ul>

            <p id="message" style="color: red; text-align:center;"></p>

            <p class="note">Recommended input range: 0 to 10 hours</p>
            <p class="footer">Built by teja</p>

        </div>

        <script>
            let chart;

            async function updateChart(hours, marks) {
                const ctx = document.getElementById('myChart').getContext('2d');
                if (chart) {
                    chart.destroy();
                }

                chart = new Chart(ctx, {
                    type: "line",
                    data: {
                        labels: [0, hours],
                        datasets: [{
                            label: "Marks Prediction",
                            data: [0, marks],
                            borderColor: "#22c55e",
                            backgroundColor: "rgba(34,197,94,0.2)",
                            fill: true,
                            tension: 0.4,
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: {
                                display: true
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true
                            }
                        }
                    }
                });
            }

            async function predictMarks() {
                const token = localStorage.getItem("token");
                if (!token) {
                    alert("Please login first");
                    return;
                }

                const message = document.getElementById("message");
                let hours = parseFloat(document.getElementById('hours').value);
                const result = document.getElementById("result");
                let btn = document.getElementById("predict-btn");

                if (isNaN(hours)) {
                    result.style.color = "red";
                    result.innerText = "Enter hours between 0 and 10";
                    return;
                }

                if (hours < 0 || hours > 10) {
                    result.style.color = "red";
                    result.innerText = "Enter hours between 0 and 10";
                    return;
                }

                
                const username = localStorage.getItem("username");

                message.innerText = "";
                result.style.color = "#111827";
                result.innerText = "Predicting...";
                btn.disabled = true;
                btn.innerText = "Predicting...";


                try {
                    const API_URL = "/predict";

                    let response = await fetch(API_URL, {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "Authorization": "Bearer " + token
                        },
                        body: JSON.stringify({
                            hours: hours
                         })
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }

                    const data = await response.json();

                    if (data.error) {
                        message.innerText = data.error;
                        return;
                    } else {
                        message.innerText = "";
                    }

                    let marks = Number(data.predicted_marks).toFixed(2);
                    
                    result.style.color = "#15803d";
                    result.innerText = "Marks: " + marks;
                    updateChart(hours, Number(marks));

                    loadHistory();

                    
                    document.getElementById("hours").value = "";

                } catch (error) {
                    console.error("Error fetching prediction:", error);
                    result.style.color = "red";
                    result.innerText = "Server error";
                    message.innerText = "Real error:" +error.message;
                } finally {
                    btn.disabled = false;
                    btn.innerText = "Predict Marks";
                }
            }

            async function loginUser() {
                const username = document.getElementById("username").value.trim();
                const password = document.getElementById("password").value.trim();

                console.log("login password =", password);
                console.log("login password length =", password.length);

                if (!username || !password) {
                    alert("Enter username and password");
                    return;
                }

                const res = await fetch("/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password })
                });

                const data = await res.json();

                if (data.access_token) {
                    localStorage.setItem("token", data.access_token);
                    localStorage.setItem("username", username);

                    document.getElementById("loginSection").style.display = "none";
                    document.getElementById("appSection").style.display = "block";

                    document.getElementById("welcome").style.display = "block";
                    document.getElementById("welcome").innerText = "Welcome " + username;

                    loadHistory();

                    alert("Login successful!");
                } else {
                    alert(data.error || "Login failed");
                }
            }

        
            async function signup() {
                const username = document.querySelector("#username").value.trim();
                const password = document.querySelector("#password").value.trim();

                console.log("signup password =", password);
                console.lo("signup password length =", password.length);


                if (!username || !password) {
                    alert("Enter username and password");
                    return;
                }

                try {
                    const res = await fetch("/signup", {
                        method: "POST",
                        headers: {
                            "content-type": "application/json"
                        },
                        body: JSON.stringify({
                            username: username,
                            password: password
                        })
                    });
                    const data = await res.json();
                    alert(data.message || data.error || "Signup failed");
                } catch (error) {
                    console.error("Signup error:", error);
                    alert("Signup request failed");
                }
                
            }

            async function loadHistory() {
                try {
                    const username = localStorage.getItem("username");
                    const token = localStorage.getItem("token");

                    if (!username || !token) {
                        console.log("NO user or token found")
                        return;
                    }

                    const res = await fetch(`/history/${username}`, {
                        method: "GET",
                        headers: {
                            "Authorization": "Bearer " + token
                        }
                    });

                    if (!res.ok) {
                        console.log("History fetch failed:", res.status);
                        return
                    }
                    const data = await res.json();
                    console.log("history response =", data);

                    let historyData = [];

                    if (data.history && Array.isArray(data.history)) {
                        historyData = data.history;
                    } else if (Array.isArray(data)) {
                        historyData = data;
                    } else {
                        console.log("Unexpected format");
                        return;
                    }
                    showHistory(historyData);
                } catch (err) {
                    console.log("error loading history:", err);

                }
            }

            async function clearHistory() {
                try {
                    const username = localStorage.getItem("username");
                    const token = localStorage.getItem("token");

                    const res = await fetch(`/history/${username}`, {
                        method: "DELETE",
                        headers: {
                            "Authorization": "Bearer " + token
                        }
                    });

                    if (res.ok) {
                        alert("History cleared");
                        loadHistory();
                    } else {
                        alert("Failed to clear history");
                    }
                } catch (err) {
                    console.log("error clearing history:", err);
                    alert("Error clearing history");
                }
            }

            function showHistory(data) {
                const list = document.getElementById("historyList");
                list.innerHTML = "";

                if (data.length === 0) {
                    const li = document.createElement("li");
                    li.textContent = "No history found";
                    li.appendChild(li);
                    return;
                }

                const reversedData = [...data].reverse(); 

                reversedData.forEach(item => {
                    const li = document.createElement("li");

                    li.innerHTML = `
                    <div class="history-card">
                        <span class="hours"> ${item.hours} hrs</span>
                        <span class="marks"> ${item.predicted_marks} </span>
                    </div>
                    `;
                    list.appendChild(li);
                });
            }
       

            function logout() {
                localStorage.removeItem("token");
                localStorage.removeItem("username");

                document.getElementById("loginSection").style.display = "block";
                document.getElementById("appSection").style.display = "none";

                document.getElementById("welcome").style.display = "none";

                alert("Logged out");
            }

            window.onload = function () {
                const token = localStorage.getItem("token");
                const username = localStorage.getItem("username");

                if (token) {

                    document.getElementById("loginSection").style.display = "none";
                    document.getElementById("appSection").style.display = "block";

                    document.getElementById("welcome").style.display = "block";
                    document.getElementById("welcome").innerText = "Welcome, " + username;
                    loadHistory();
                }
            };

        </script>
    </body>
</html>
